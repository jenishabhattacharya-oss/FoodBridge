{% extends "accounts/auth_layout.html" %}
{% block title %}
    Email Sent | FoodBridge
{% endblock %}
{% block auth_content %}
    <div class="text-center">
        <div class="mb-4">
            <i class="bi bi-envelope-check display-3 text-warning"></i>
        </div>
        <h2>Check Your Email</h2>
        <p class="mt-3">
            If an account exists with the email you entered,
            we've sent password reset instructions.
        </p>
        <a href="{% url 'login' %}" class="btn btn-warning mt-4">Back to Login</a>
    </div>
{% endblock %}
